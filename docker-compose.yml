services:
  ollama:
    image: ollama/ollama
    container_name: aria-llm
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      OLLAMA_KEEP_ALIVE: -1
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:14b}
      EMBED_MODEL: ${EMBED_MODEL:-nomic-embed-text}
    volumes:
      - ollama_data:/root/.ollama
      - ./docker/ollama/entry.sh:/entry.sh:ro
    entrypoint: ["/bin/sh", "/entry.sh"]
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8002:8000"
    volumes:
      - chroma_data:/data
    healthcheck:
      # The chroma image ships no curl/wget/python3 — probe the port directly
      # via bash's /dev/tcp instead of an HTTP client.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8000"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Separate from `redis` above (which stays plain — Celery's broker/
  # backend need nothing more) specifically because `langgraph-checkpoint-
  # redis` requires the RediSearch/RedisJSON modules for its checkpoint
  # indices (confirmed live: plain `redis:7-alpine` fails with "unknown
  # command 'FT._LIST'"). Scoped to `ai-service` alone — a bug or outage
  # in agent-orchestration state has zero blast radius on core-api/
  # worker's Celery queue, per strict decoupling.
  agent-store:
    image: redis/redis-stack-server:latest
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: aria
      MINIO_ROOT_PASSWORD: aria-dev-secret
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  core-api:
    build:
      context: .
      dockerfile: docker/python-service.Dockerfile
      args:
        SERVICE: core-api
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir ./app --reload-dir ../../libs/shared/src --reload-dir ../../libs/auth/src
    ports:
      - "8000:8000"
    environment:
      CORE_API_MONGO_URI: mongodb://mongo:27017
      CORE_API_MONGO_DB_NAME: aria
      CORE_API_S3_ENDPOINT_URL: http://minio:9000
      CORE_API_S3_BUCKET: aria-documents
      CORE_API_S3_ACCESS_KEY_ID: aria
      CORE_API_S3_SECRET_ACCESS_KEY: aria-dev-secret
      CORE_API_S3_REGION: us-east-1
      CORE_API_CELERY_BROKER_URL: redis://redis:6379/0
    volumes:
      - ./services/core-api/app:/app/services/core-api/app
      - ./libs/shared/src:/app/libs/shared/src
      - ./libs/auth/src:/app/libs/auth/src
    depends_on:
      mongo:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai-service:
    build:
      context: .
      dockerfile: docker/python-service.Dockerfile
      args:
        SERVICE: ai-service
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload --reload-dir ./app --reload-dir ../../libs/shared/src --reload-dir ../../libs/auth/src
    ports:
      - "8001:8001"
    environment:
      AI_SERVICE_CHROMA_HOST: chromadb
      AI_SERVICE_CHROMA_PORT: 8000
      AI_SERVICE_CORE_API_URL: http://core-api:8000
      AI_SERVICE_OLLAMA_HOST: http://ollama:11434
      AI_SERVICE_OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:14b}
      AI_SERVICE_EMBED_MODEL: ${EMBED_MODEL:-nomic-embed-text}
      AI_SERVICE_MODEL_ADAPTER: qwen
      AI_SERVICE_RAG_TOP_K: 4
      AI_SERVICE_RAG_MAX_DISTANCE: 0.9
      AI_SERVICE_FRONTEND_ORIGIN: http://localhost:5173
      AI_SERVICE_REDIS_URL: redis://agent-store:6379/0
    volumes:
      - ./services/ai-service/app:/app/services/ai-service/app
      - ./libs/shared/src:/app/libs/shared/src
      - ./libs/auth/src:/app/libs/auth/src
    depends_on:
      chromadb:
        condition: service_healthy
      ollama:
        condition: service_started
      agent-store:
        condition: service_healthy

  # Its own process, not mounted into ai-service's FastAPI app — mounting a
  # FastMCP streamable-HTTP app onto an existing FastAPI app is a documented
  # rough edge (nested ASGI lifespans aren't recognized, see
  # modelcontextprotocol/python-sdk#1367), and this has no need to share a
  # process with ai-service anyway. Same image/build as ai-service (just a
  # different container command) so app/mcp_tools.py is shared code, not a
  # duplicated implementation. No dependency on agent-store/redis — this
  # process never touches LangGraph or the checkpointer, only core-api.
  # Behind the "mcp" profile (`docker compose --profile mcp up`) — ARIA's
  # own graph calls app/mcp_tools.py in-process and never talks to this
  # server (see the M8 plan), so it has no consumer until an external MCP
  # client actually connects; opt-in instead of standing infra by default
  # (caught in code review).
  mcp-server:
    profiles: ["mcp"]
    build:
      context: .
      dockerfile: docker/python-service.Dockerfile
      args:
        SERVICE: ai-service
    command: uv run python -m app.mcp_server
    ports:
      - "8003:8003"
    environment:
      AI_SERVICE_CORE_API_URL: http://core-api:8000
      AI_SERVICE_MCP_SERVER_PORT: 8003
    volumes:
      - ./services/ai-service/app:/app/services/ai-service/app
      - ./libs/shared/src:/app/libs/shared/src
      - ./libs/auth/src:/app/libs/auth/src
    depends_on:
      core-api:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: docker/python-service.Dockerfile
      args:
        SERVICE: worker
    command: uv run watchmedo auto-restart --directory=./app --directory=../../libs/shared/src --pattern=*.py --recursive --debug-force-polling -- celery -A app.celery_app worker --loglevel=INFO
    environment:
      WORKER_BROKER_URL: redis://redis:6379/0
      WORKER_RESULT_BACKEND: redis://redis:6379/1
      WORKER_MONGO_URI: mongodb://mongo:27017
      WORKER_MONGO_DB_NAME: aria
      WORKER_S3_ENDPOINT_URL: http://minio:9000
      WORKER_S3_BUCKET: aria-documents
      WORKER_S3_ACCESS_KEY_ID: aria
      WORKER_S3_SECRET_ACCESS_KEY: aria-dev-secret
      WORKER_S3_REGION: us-east-1
      WORKER_CHROMA_HOST: chromadb
      WORKER_CHROMA_PORT: 8000
      WORKER_OLLAMA_HOST: http://ollama:11434
      WORKER_OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:14b}
      WORKER_EMBED_MODEL: ${EMBED_MODEL:-nomic-embed-text}
    volumes:
      - ./services/worker/app:/app/services/worker/app
      - ./libs/shared/src:/app/libs/shared/src
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
      chromadb:
        condition: service_healthy
      minio:
        condition: service_healthy
      ollama:
        condition: service_started

  frontend:
    build:
      context: ./services/frontend
    ports:
      - "5173:5173"
    environment:
      VITE_CORE_API_URL: http://localhost:8000
      VITE_AI_SERVICE_URL: http://localhost:8001
    volumes:
      - ./services/frontend:/app
      - /app/node_modules
    depends_on:
      - core-api
      - ai-service

volumes:
  mongo_data:
  chroma_data:
  ollama_data:
  minio_data:
